{% extends 'base.html' %}

{% block title %}Link expired{% endblock %}

{% block content %}
<div class="container py-5 d-flex justify-content-center align-items-center" style="min-height: 80vh;">
  <div class="card bg-dark text-light shadow-lg p-4 w-100 text-center" style="max-width: 400px;">
    <h2 class="mb-3">Link expired or invalid</h2>
    <p>This activation link has expired or already been used.</p>
    <a href="{% url 'register' %}" class="btn btn-light">Register again</a>
  </div>
</div>
{% endblock %}
