{% load components %}
{% load static %}
<!doctype html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="{% block description %}SWCCG Database, Your Personal Database of What Cards You Own{% endblock %}"
    />
    <meta
      name="keywords"
      content="swccg, star wars ccg, card game, card collection, card database, swccgdb"
    />
    <meta name="author" content="Steyaert Family" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta
      property="og:title"
      content="{% block og_title %}SWCCG Database{% endblock %}"
    />
    <meta
      property="og:description"
      content="{% block og_description %}SWCCG Database, Your Personal Database of What Cards You Own{% endblock %}"
    />
    {# <meta property="og:image" content="{% block og_image %}{% static 'og.png' %}{% endblock %}" /> #}

    <!-- Twitter -->
    <meta name="twitter:card" content="summary" />
    <meta
      name="twitter:title"
      content="{% block twitter_title %}SWCCG Database{% endblock %}"
    />
    <meta
      name="twitter:description"
      content="{% block twitter_description %}SWCCG Database, Your Personal Database of What Cards You Own{% endblock %}"
    />

    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-SgOJa3DmI69IUzQ2PVdRZhwQ+dy64/BUtbMJw1MZ8t5HZApcHrRKUc4W0kG879m7"
      crossorigin="anonymous"
    />
    {# <link rel="icon" type="image/png" href="{% static 'smdb.png' %}" /> #}
    {% block metaLinks %}{% endblock %}
    <title>
      {% block title %}Title{% endblock %} | SWCCG Database
    </title>
  </head>
  <body>
    {% navbar %}
    <main class="container mt-4 mb-5">{% block content %}{% endblock %}</main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js" integrity="sha384-k6d4wzSIapyDyv1kpU366/PK5hCdSbCRGRCMv+eplOQJWyd1fbcAu9OCUj5zNLiq" crossorigin="anonymous"></script>
    {% block scripts %}{% endblock %}
  </body>
</html>
