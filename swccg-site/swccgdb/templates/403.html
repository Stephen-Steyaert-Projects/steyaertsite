<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>403 — SWCCG Database</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0d0d0d;
            color: #e0e0e0;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .bg-number {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
        }

        .bg-number::before {
            content: "403";
            font-size: 40vw;
            font-weight: 900;
            color: #1a1a1a;
            user-select: none;
            line-height: 1;
            pointer-events: none;
        }

        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 2rem;
        }

        .title {
            font-size: 1.4rem;
            font-weight: bold;
            color: #e0e0e0;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .subtitle {
            margin-top: 0.75rem;
            font-size: 0.9rem;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="bg-number"></div>
    <div class="container">
        <div class="title">Access Denied</div>
        <div class="subtitle">You don't have permission to view this page.</div>
    </div>
</body>
</html>
