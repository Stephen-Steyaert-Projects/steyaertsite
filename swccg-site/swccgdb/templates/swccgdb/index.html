{% extends 'base.html' %}

{% block title %}Welcome{% endblock %}

{% block content %}
<div class="d-flex justify-content-center align-items-center" style="min-height: 80vh;">
  <div class="card bg-dark text-light shadow-lg p-5 text-center" style="max-width: 450px; width: 100%;">
    <h1 class="fw-bold mb-2">SWCCG Database</h1>
    <p class="text-secondary mb-4">Your personal Star Wars CCG card collection tracker.</p>
    <div class="d-grid gap-3">
      <a href="{% url 'login' %}" class="btn btn-light">Log In</a>
      <a href="{% url 'register' %}" class="btn btn-outline-light">Register</a>
    </div>
  </div>
</div>
{% endblock %}
